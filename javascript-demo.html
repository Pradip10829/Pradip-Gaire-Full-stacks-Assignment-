<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Demo</title>
    <style>
      :root { --bg:#eef3f7; --card:#fff; --ink:#1f2937; --accent:#0f766e; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
      main { width:min(840px, 92%); margin:auto; padding:1.2rem 0; }
      .card { background:var(--card); border:1px solid #d3dbe3; border-radius:14px; padding:1rem; box-shadow:0 10px 20px rgba(30,41,59,.07); }
      .row { display:flex; gap:.6rem; flex-wrap:wrap; }
      input, select, button { padding:.55rem; border-radius:8px; border:1px solid #bcc8d6; }
      input { flex:1; min-width:210px; }
      button { background:var(--accent); color:#fff; border:none; cursor:pointer; }
      ul { list-style:none; padding:0; margin-top:1rem; }
      li { display:flex; justify-content:space-between; align-items:center; gap:.7rem; border:1px solid #d5dde7; border-radius:10px; padding:.6rem; background:#fff; }
      li.done span { text-decoration: line-through; opacity:.65; }
      .actions button { background:#1f2937; padding:.4rem .6rem; }
      .stats { margin-top:.8rem; color:#4b5563; font-size:.94rem; }
      a { color:#0c4a6e; }
    </style>
  </head>
  <body>
    <main>
      <h1>Working Demo: JavaScript Task Tracker</h1>
      <p>This mini app demonstrates DOM updates, event handling, filtering, and localStorage persistence.</p>

      <section class="card">
        <div class="row">
          <input id="taskInput" placeholder="Enter a task" aria-label="Task input" />
          <button id="addBtn">Add Task</button>
          <select id="filter">
            <option value="all">All</option>
            <option value="open">Open</option>
            <option value="done">Done</option>
          </select>
        </div>

        <ul id="taskList" aria-live="polite"></ul>
        <p class="stats" id="stats"></p>
      </section>

      <p><a href="../index.html">Back to ePortfolio</a></p>
    </main>

    <script>
      const taskInput = document.getElementById('taskInput');
      const addBtn = document.getElementById('addBtn');
      const filter = document.getElementById('filter');
      const taskList = document.getElementById('taskList');
      const stats = document.getElementById('stats');
      const KEY = 'cet138-js-demo-tasks';

      let tasks = JSON.parse(localStorage.getItem(KEY) || '[]');

      function save() {
        localStorage.setItem(KEY, JSON.stringify(tasks));
      }

      function render() {
        const mode = filter.value;
        const view = tasks.filter(t => mode === 'all' ? true : mode === 'done' ? t.done : !t.done);
        taskList.innerHTML = '';

        view.forEach(task => {
          const li = document.createElement('li');
          if (task.done) li.classList.add('done');

          const text = document.createElement('span');
          text.textContent = task.text;

          const actions = document.createElement('div');
          actions.className = 'actions';

          const toggle = document.createElement('button');
          toggle.textContent = task.done ? 'Undo' : 'Done';
          toggle.addEventListener('click', () => {
            task.done = !task.done;
            save();
            render();
          });

          const remove = document.createElement('button');
          remove.textContent = 'Delete';
          remove.addEventListener('click', () => {
            tasks = tasks.filter(t => t.id !== task.id);
            save();
            render();
          });

          actions.append(toggle, remove);
          li.append(text, actions);
          taskList.appendChild(li);
        });

        const done = tasks.filter(t => t.done).length;
        stats.textContent = `Total: ${tasks.length} | Completed: ${done} | Open: ${tasks.length - done}`;
      }

      addBtn.addEventListener('click', () => {
        const text = taskInput.value.trim();
        if (!text) return;
        tasks.push({ id: crypto.randomUUID(), text, done: false });
        taskInput.value = '';
        save();
        render();
      });

      filter.addEventListener('change', render);
      render();
    </script>
  </body>
</html>
